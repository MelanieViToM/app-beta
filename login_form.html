<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="icon" type="image/png" href="icons/ARTIST.png">
    <style>
        body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f0f2f5;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
        }
        input {
            width: 250px;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus{
            border-color: #ffbd59;
        }
        button{
            width: 275px;
            padding: 12px;
            background-color: #ffbd59;
            color: black;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover{
            background-color: #ffbd59;
        }
        label{
            font-size: 14px;
            color: #333;
            width: 275px;
            text-align: left;
        }
    </style>
</head>
<body>
    <img src="images/UserName.png" width="100" alt="User Image">
    <br>
    <label>Username</label>
    <input type="text" border-radius: 10px><br>
    <label>Password</label>
    <input type="password"><br>
    <button>Login</button>
</body>
</html>
